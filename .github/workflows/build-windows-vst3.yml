name: Build Windows VST3

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows-vst3:
    runs-on: windows-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build VST3 Release
        run: |
          msbuild "Builds\VisualStudio2022\StringEngine.sln" /p:Configuration=Release /p:Platform=x64

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: StringEngine-Windows-VST3
          path: |
            Builds\VisualStudio2022\x64\Release\VST3\*.vst3
            Builds\VisualStudio2022\x64\Release\VST3\**\*